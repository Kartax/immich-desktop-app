name: ImmichDesktop
options:
  bundleIdPrefix: org.kartax
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    # Personal Team ID, so signing survives `xcodegen generate`. Change this if you
    # build under a different Apple ID / team.
    DEVELOPMENT_TEAM: "8HAG9JU2ZK"

targets:
  ImmichDesktop:
    type: application
    platform: macOS
    sources:
      - ImmichDesktop
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.kartax.ImmichDesktop
        INFOPLIST_FILE: ImmichDesktop/Info.plist
        CODE_SIGN_ENTITLEMENTS: ImmichDesktop/ImmichDesktop.entitlements
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: FileProviderExt
        embed: true

  FileProviderExt:
    type: app-extension
    platform: macOS
    sources:
      - FileProviderExt
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.kartax.ImmichDesktop.FileProvider
        INFOPLIST_FILE: FileProviderExt/Info.plist
        CODE_SIGN_ENTITLEMENTS: FileProviderExt/FileProviderExt.entitlements
        GENERATE_INFOPLIST_FILE: NO

# Explicit, runnable scheme for the app so it survives regeneration and Xcode
# always knows what to launch (avoids the "Choose an app to run" dialog).
schemes:
  ImmichDesktop:
    build:
      targets:
        ImmichDesktop: all
    run:
      config: Debug
    archive:
      config: Release
